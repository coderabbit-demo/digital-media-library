name: Deploy

# Build & push the API image to Artifact Registry, deploy Cloud Run, and publish
# the SPA to the hosting bucket. Manual by default; wire to `push: branches:[main]`
# once GCP auth is configured. Requires repo/org config + secrets:
#   vars: GCP_PROJECT_ID, GCP_REGION (us-central1), ARTIFACT_REPO, GCS_SPA_BUCKET,
#         CLOUD_RUN_SERVICE, WORKLOAD_IDENTITY_PROVIDER, DEPLOY_SERVICE_ACCOUNT
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build/deploy
        default: latest

permissions:
  contents: read
  id-token: write # for google-github-actions/auth via Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO }}/api:${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't leave the workflow token in git config; build steps run here.
          persist-credentials: false

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      # --- Backend API image (T051) ---
      - name: Build & push API image
        run: |
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ vars.GCP_REGION }} \
            --quiet

      # --- SPA → hosting bucket + CDN (T052) ---
      # Version comes from "packageManager" in package.json (pnpm@9.12.0).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build SPA
        run: pnpm --filter @dml/frontend build
      - name: Publish SPA to bucket
        run: |
          gcloud storage rsync frontend/dist gs://${{ vars.GCS_SPA_BUCKET }} \
            --recursive --delete-unmatched-destination-objects
      - name: Invalidate CDN
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CLOUD_RUN_SERVICE }}-urlmap \
            --path "/*" --async || true
