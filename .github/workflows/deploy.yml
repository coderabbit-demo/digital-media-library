name: Deploy

# Build & push the API + migration images to Artifact Registry, run migrations,
# deploy Cloud Run, and publish the SPA to the hosting bucket + CDN.
#
# Auth is keyless via Workload Identity Federation. Requires repo variables:
#   GCP_PROJECT_ID, GCP_REGION, ARTIFACT_REPO, GCS_SPA_BUCKET, CLOUD_RUN_SERVICE,
#   CLOUD_RUN_MIGRATE_JOB, CDN_URL_MAP, WORKLOAD_IDENTITY_PROVIDER,
#   DEPLOY_SERVICE_ACCOUNT
on:
  push:
    branches: [main]
    # Only deploy when shippable code changes (skip docs/specs-only commits).
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build/deploy (default: commit SHA)'
        required: false

permissions:
  contents: read
  id-token: write # for google-github-actions/auth via Workload Identity Federation

# Avoid overlapping prod deploys.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only ever deploy main to prod — block manual dispatches from other branches.
    if: github.ref == 'refs/heads/main'
    env:
      # On push, tag by commit SHA; on manual run, honor the input (else SHA).
      TAG: ${{ inputs.image_tag || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve image refs
        run: |
          BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPO }}"
          echo "IMAGE=$BASE/api:$TAG" >> "$GITHUB_ENV"
          echo "MIGRATE_IMAGE=$BASE/migrate:$TAG" >> "$GITHUB_ENV"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      # --- Images (runner is linux/amd64, matching Cloud Run) ---
      - name: Build & push API image
        run: |
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Build & push migration image
        run: |
          docker build -f backend/Dockerfile --target migrate -t "$MIGRATE_IMAGE" .
          docker push "$MIGRATE_IMAGE"

      # --- Migrate (before rolling new API code) ---
      - name: Run database migrations (Cloud Run Job)
        run: |
          gcloud run jobs update ${{ vars.CLOUD_RUN_MIGRATE_JOB }} \
            --image "$MIGRATE_IMAGE" --region ${{ vars.GCP_REGION }} --quiet
          gcloud run jobs execute ${{ vars.CLOUD_RUN_MIGRATE_JOB }} \
            --region ${{ vars.GCP_REGION }} --wait

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --image "$IMAGE" --region ${{ vars.GCP_REGION }} --quiet

      # --- SPA → hosting bucket + CDN ---
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build SPA
        run: pnpm --filter @dml/frontend build
      - name: Publish SPA to bucket
        run: |
          gcloud storage rsync frontend/dist gs://${{ vars.GCS_SPA_BUCKET }} \
            --recursive --delete-unmatched-destination-objects
      - name: Invalidate CDN
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --path "/*" --async || true
