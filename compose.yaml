# Local development dependencies (PostgreSQL + Redis).
# Matches the DATABASE_URL / REDIS_URL in .env.example.
# Start with:  docker compose up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dml
      POSTGRES_PASSWORD: dml
      POSTGRES_DB: dml
    ports:
      - '5432:5432'
    volumes:
      - dml_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dml']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dml_pgdata:
